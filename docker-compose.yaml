# caddy.yml
services:
  caddy:
    image: caddy:alpine
    container_name: caddy-fps
    volumes:
      - ./index.html:/usr/share/caddy/index.html:ro
      - ./src/:/usr/share/caddy/src:ro
    networks:
      - backend
    labels:
      - "traefik.enable=true"
      # HTTPS router - global redirect handles HTTP to HTTPS
      - "traefik.http.routers.fps.rule=Host(`fps.${DOMAIN}`)"
      - "traefik.http.routers.fps.entrypoints=websecure"
      - "traefik.http.routers.fps.tls=true"
      - "traefik.http.routers.fps.tls.certresolver=le"

networks:
  backend:
    name: traefik_backend
    external: true
